<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Lip Reading Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            /* Sleek dark gradient background */
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        /* Glassmorphism Card Effect */
        .dashboard-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 50px 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            max-width: 500px;
            width: 90%;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 5px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        p.subtitle {
            color: #a0aec0;
            margin-bottom: 40px;
            font-size: 1rem;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Base Button Styles */
        .action-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px 30px;
            color: white;
            text-decoration: none;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* Individual Button Gradients */
        .btn-collect {
            background: linear-gradient(135deg, #3498db, #2980b9);
        }
        .btn-results {
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
        }
        .btn-translate {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
        }

        /* Smooth Hover Animations */
        .action-btn:hover {
            transform: translateY(-5px) scale(1.02);
        }
        .btn-collect:hover { box-shadow: 0 10px 20px rgba(52, 152, 219, 0.4); }
        .btn-results:hover { box-shadow: 0 10px 20px rgba(155, 89, 182, 0.4); }
        .btn-translate:hover { box-shadow: 0 10px 20px rgba(46, 204, 113, 0.4); }

        .icon {
            margin-right: 12px;
            font-size: 1.4rem;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <h1>👄 AI Lip Reading</h1>
        <p class="subtitle">Visual Speech Recognition Engine</p>
        
        <div class="btn-container">
            <a href="/collector" class="action-btn btn-collect">
                <span class="icon">🎥</span> Step 1: Collect Data
            </a>
            
            <a href="/results" class="action-btn btn-results">
                <span class="icon">📊</span> Step 2: Testing Results
            </a>
            
            <a href="/translator" class="action-btn btn-translate">
                <span class="icon">🤖</span> Step 3: Live Translator
            </a>
        </div>
    </div>

</body>
</html>
